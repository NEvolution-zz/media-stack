services:
  bazarr:
    image: linuxserver/bazarr
    container_name: bazarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Hong_Kong
    volumes:
      - ~/docker/config_files/bazarr/config:/config
      - /mnt:/mnt
    ports:
      - "6767:6767"
    restart: unless-stopped
    networks:
      - proxy

networks:
  proxy:
    external: true
