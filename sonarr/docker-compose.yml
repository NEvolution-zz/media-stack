services:
  sonarr:
    image: linuxserver/sonarr
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Hong_Kong
    volumes:
      - ~/docker/config_files/sonarr/config:/config
      - /mnt:/mnt
    ports:
      - "8989:8989"
    restart: unless-stopped
    networks:
      - proxy

networks:
  proxy:
    external: true
